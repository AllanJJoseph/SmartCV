<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 120" width="100%" height="100%">
  <!-- Document Base -->
  <rect x="10" y="10" width="80" height="100" rx="4" fill="none" stroke="#1D64B8" stroke-width="8"/>
  
  <!-- Solid Blue Square -->
  <rect x="22" y="24" width="22" height="26" fill="#1D64B8"/>
  
  <!-- Horizontal Lines -->
  <line x1="50" y1="30" x2="80" y2="30" stroke="#1D64B8" stroke-width="6" stroke-linecap="square"/>
  <line x1="50" y1="44" x2="80" y2="44" stroke="#1D64B8" stroke-width="6" stroke-linecap="square"/>
  <line x1="22" y1="62" x2="80" y2="62" stroke="#1D64B8" stroke-width="6" stroke-linecap="square"/>
  <line x1="22" y1="76" x2="65" y2="76" stroke="#1D64B8" stroke-width="6" stroke-linecap="square"/>
  <line x1="22" y1="90" x2="50" y2="90" stroke="#1D64B8" stroke-width="6" stroke-linecap="square"/>

  <!-- Paper Plane overlay -->
  <g transform="translate(45, 60) scale(1.1)">
    <!-- Main Left Wing -->
    <polygon points="0,20 50,0 20,30" fill="#3B82F6"/>
    <!-- Main Right Wing -->
    <polygon points="20,30 50,0 35,45" fill="#1D64B8"/>
    <!-- Flap Fold -->
    <polygon points="20,30 20,42 26,34" fill="#114798"/>
  </g>

  <!-- SMARTCV Text -->
  <text x="120" y="82" font-family="'Inter', 'Segoe UI', sans-serif" font-size="64" font-weight="400" letter-spacing="4" fill="#1D64B8">SMARTCV</text>
</svg>
